<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Manager — Facebook Page Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="/icon.png" alt="FB Manager" class="brand__icon" onerror="this.style.display='none'">
        <h1 class="brand__title">FB Manager</h1>
      </div>
      <nav class="nav" id="main-nav">
        <a href="#dashboard" class="nav__link active" data-feature="dashboard">
          <span class="nav__icon">🏠</span>
          <span class="nav__label">Pages Dashboard</span>
        </a>
        <a href="#video-post" class="nav__link" data-feature="videoPost">
          <span class="nav__icon">🎬</span>
          <span class="nav__label">Multi Video Post</span>
        </a>
        <a href="#scheduled" class="nav__link" data-feature="scheduled">
          <span class="nav__icon">⏰</span>
          <span class="nav__label">Scheduled Queue</span>
          <span class="badge" id="queue-badge" style="display:none">0</span>
        </a>
      </nav>
      <div class="ext-status" id="ext-status">
        <div class="ext-status__dot"></div>
        <span class="ext-status__text">Connecting…</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar__left">
          <button class="topbar__menu-btn" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
          <h2 id="page-title">Pages Dashboard</h2>
        </div>
        <div class="topbar__user" id="user-info" style="display:none">
          <img id="user-avatar" src="" alt="">
          <span id="user-name"></span>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    (function() {
      const menuToggle = document.getElementById('menu-toggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      function openSidebar() {
        sidebar.classList.add('sidebar--open');
        overlay.classList.add('visible');
        menuToggle.setAttribute('aria-expanded', 'true');
      }
      function closeSidebar() {
        sidebar.classList.remove('sidebar--open');
        overlay.classList.remove('visible');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
      menuToggle.addEventListener('click', function() {
        if (sidebar.classList.contains('sidebar--open')) closeSidebar();
        else openSidebar();
      });
      overlay.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSidebar();
      });
      // Close sidebar when a nav link is clicked (mobile)
      document.getElementById('main-nav').addEventListener('click', function(e) {
        if (e.target.closest('.nav__link') && window.innerWidth <= 768) {
          closeSidebar();
        }
      });
    })();
  </script>
  <!-- Extension bridge must load first -->
  <script src="/js/core/bridge.js"></script>
  <script src="/js/core/ui.js"></script>
  <script src="/js/core/api.js"></script>
  <!-- Feature modules -->
  <script src="/js/features/dashboard.js"></script>
  <script src="/js/features/videoPost.js"></script>
  <script src="/js/features/scheduled.js"></script>
  <!-- Router / app shell -->
  <script src="/js/core/app.js"></script>
</body>
</html>
