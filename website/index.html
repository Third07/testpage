<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Bulk Video Manager — Affiliate Video Posting</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="/icon.png" alt="FB Manager" class="brand__icon" onerror="this.style.display='none'">
        <h1 class="brand__title">Video Manager</h1>
      </div>
      <nav class="nav" id="main-nav">
        <a href="#dashboard" class="nav__link active" data-feature="dashboard">
          <span class="nav__icon">🎬</span>
          <span class="nav__label">Bulk Videos</span>
        </a>
        <a href="#scheduled" class="nav__link" data-feature="scheduled">
          <span class="nav__icon">⏰</span>
          <span class="nav__label">Scheduled Queue</span>
          <span class="badge" id="queue-badge" style="display:none">0</span>
        </a>
      </nav>
      <div class="ext-status" id="ext-status">
        <div class="ext-status__dot"></div>
        <span class="ext-status__text">Connecting…</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="page-title">Bulk Video Manager</h2>
        <div class="topbar__user" id="user-info" style="display:none">
          <img id="user-avatar" src="" alt="">
          <span id="user-name"></span>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Extension bridge must load first -->
  <script src="/js/bridge.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <!-- Feature modules -->
  <script src="/js/features/dashboard.js"></script>
  <script src="/js/features/scheduled.js"></script>
  <!-- Router / app shell -->
  <script src="/js/app.js"></script>
</body>
</html>
