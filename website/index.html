<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Manager — Facebook Page Manager</title>
  <meta name="description" content="Studio for managing Facebook Pages — multi-post videos, schedule queues, and one-glance dashboards.">
  <meta name="theme-color" content="#312e81">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Animated gradient backdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop__blob backdrop__blob--1"></div>
    <div class="backdrop__blob backdrop__blob--2"></div>
    <div class="backdrop__blob backdrop__blob--3"></div>
    <div class="backdrop__noise"></div>
  </div>

  <div id="app">
    <aside class="rail" id="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <img src="/icon.png" alt="FB Manager" class="brand__icon" onerror="this.style.display='none'">
        <h1 class="brand__title">FB Manager</h1>
      </div>
      <nav class="nav" id="main-nav">
        <a href="#dashboard" class="nav__link active" data-feature="dashboard" data-tooltip="Pages Dashboard">
          <span class="nav__icon" aria-hidden="true">🏠</span>
          <span class="nav__label">Dashboard</span>
        </a>
        <a href="#video-post" class="nav__link" data-feature="videoPost" data-tooltip="Multi Video Post">
          <span class="nav__icon" aria-hidden="true">🎬</span>
          <span class="nav__label">Video Post</span>
          <span class="badge" id="queue-badge" style="display:none">0</span>
        </a>
        <a href="#scheduled" class="nav__link" data-feature="scheduled" data-tooltip="Scheduled Queue">
          <span class="nav__icon" aria-hidden="true">⏰</span>
          <span class="nav__label">Scheduled</span>
        </a>
      </nav>
      <div class="ext-status" id="ext-status">
        <div class="ext-orb" aria-hidden="true">
          <span class="ext-orb__core"></span>
        </div>
        <span class="ext-status__text">Connecting…</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar__left">
          <h2 id="page-title">Pages Dashboard</h2>
        </div>
        <div class="topbar__user" id="user-info" style="display:none">
          <img id="user-avatar" src="" alt="">
          <span id="user-name"></span>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Mobile preview sheet (used by videoPostPreview.js) -->
  <div class="vp-preview-sheet" id="vp-preview-sheet" aria-hidden="true">
    <div class="vp-preview-sheet__inner">
      <button class="vp-preview-sheet__close" id="vp-preview-close" aria-label="Close preview">✕</button>
      <div class="vp-col__label" style="margin-bottom:14px">Live Preview</div>
      <div id="vp-preview-sheet-body"></div>
    </div>
  </div>
  <button class="vp-preview-fab" id="vp-preview-fab" aria-label="Show live preview">
    👁 Live preview
  </button>

  <script>
    (function() {
      const menuToggle = document.getElementById('menu-toggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      // Defensive: legacy overlay handler — only attaches if those nodes exist
      if (menuToggle && sidebar) {
        const openSidebar = function() {
          sidebar.classList.add('sidebar--open');
          if (overlay) overlay.classList.add('visible');
          menuToggle.setAttribute('aria-expanded', 'true');
        };
        const closeSidebar = function() {
          sidebar.classList.remove('sidebar--open');
          if (overlay) overlay.classList.remove('visible');
          menuToggle.setAttribute('aria-expanded', 'false');
        };
        menuToggle.addEventListener('click', function() {
          if (sidebar.classList.contains('sidebar--open')) closeSidebar();
          else openSidebar();
        });
        if (overlay) overlay.addEventListener('click', closeSidebar);
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') closeSidebar();
        });
        document.getElementById('main-nav').addEventListener('click', function(e) {
          if (e.target.closest('.nav__link') && window.innerWidth <= 768) {
            closeSidebar();
          }
        });
      }
    })();
  </script>
  <!-- Extension bridge must load first -->
  <script src="/js/core/bridge.js"></script>
  <script src="/js/core/ui.js"></script>
  <script src="/js/core/api.js"></script>
  <!-- Feature modules -->
  <script src="/js/features/dashboard.js"></script>
  <script src="/js/features/videoPost.js"></script>
  <script src="/js/features/scheduled.js"></script>
  <!-- Preview-first composer signature: wraps videoPost output in two-column layout + live preview -->
  <script src="/js/features/videoPostPreview.js"></script>
  <!-- Router / app shell -->
  <script src="/js/core/app.js"></script>
</body>
</html>
