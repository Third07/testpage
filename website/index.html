<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Manager — Facebook Page Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="/icon.png" alt="FB Manager" class="brand__icon" onerror="this.style.display='none'">
        <h1 class="brand__title">FB Manager</h1>
      </div>
      <nav class="nav" id="main-nav">
        <a href="#dashboard" class="nav__link active" data-feature="dashboard">
          <span class="nav__icon">🏠</span>
          <span class="nav__label">Pages Dashboard</span>
        </a>
        <a href="#clone-post" class="nav__link" data-feature="clonePost">
          <span class="nav__icon">📋</span>
          <span class="nav__label">Clone Post</span>
        </a>
        <a href="#video-post" class="nav__link" data-feature="videoPost">
          <span class="nav__icon">🎬</span>
          <span class="nav__label">Multi Video Post</span>
        </a>
        <a href="#image-post" class="nav__link" data-feature="imagePost">
          <span class="nav__icon">🖼️</span>
          <span class="nav__label">Bulk Image Post</span>
        </a>
        <a href="#text-post" class="nav__link" data-feature="textPost">
          <span class="nav__icon">📝</span>
          <span class="nav__label">Text &amp; Link Post</span>
        </a>
        <a href="#tiktok-pipe" class="nav__link" data-feature="tiktokPipe">
          <span class="nav__icon">🔄</span>
          <span class="nav__label">TikTok → Facebook</span>
        </a>
        <a href="#scheduled" class="nav__link" data-feature="scheduled">
          <span class="nav__icon">⏰</span>
          <span class="nav__label">Scheduled Queue</span>
          <span class="badge" id="queue-badge" style="display:none">0</span>
        </a>
      </nav>
      <div class="ext-status" id="ext-status">
        <div class="ext-status__dot"></div>
        <span class="ext-status__text">Connecting…</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="page-title">Pages Dashboard</h2>
        <div class="topbar__user" id="user-info" style="display:none">
          <img id="user-avatar" src="" alt="">
          <span id="user-name"></span>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Extension bridge must load first -->
  <script src="/js/bridge.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <!-- Feature modules -->
  <script src="/js/features/dashboard.js"></script>
  <script src="/js/features/clonePost.js"></script>
  <script src="/js/features/videoPost.js"></script>
  <script src="/js/features/imagePost.js"></script>
  <script src="/js/features/textPost.js"></script>
  <script src="/js/features/tiktokPipe.js"></script>
  <script src="/js/features/scheduled.js"></script>
  <!-- Router / app shell -->
  <script src="/js/app.js"></script>
</body>
</html>
